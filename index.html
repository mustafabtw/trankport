<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trankport</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trankport">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="splash" class="splash-screen">
        <img src="icon.png" alt="Trankport Logo" class="splash-logo">
    </div>

    <div class="giant-red-circle"></div>

    <div class="app-wrapper">
        <header class="header">
            <img src="icon.png" alt="Trankport" class="top-logo">
            <p>Hızlı Durum Takibi</p>
        </header>

        <main class="content">
            <div class="glass-card">
                <div class="input-section">
                    <label>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        Hangi duraktasın?
                    </label>
                    <div class="custom-select">
                        <select id="station-select" onchange="calculateTime()">
                            <option value="" disabled selected>Durak Seçin...</option>
                        </select>
                    </div>
                </div>

                <div class="app-icon-divider">
                    <div class="icon-dot"></div>
                    <div class="icon-line"></div>
                    <div class="icon-dot"></div>
                </div>

                <div class="input-section">
                    <label>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
                        Hangi yöne gideceksin?
                    </label>
                    <div class="segmented-control">
                        <input type="radio" id="dir-sincan" name="direction" value="kayas_sincan" onchange="calculateTime()">
                        <label for="dir-sincan">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                            Sincan
                        </label>

                        <input type="radio" id="dir-kayas" name="direction" value="sincan_kayas" onchange="calculateTime()">
                        <label for="dir-kayas">
                            Kayaş
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        </label>
                    </div>
                </div>
            </div>

            <div id="result-area" class="result-area hidden">
                <div class="result-header">SONRAKİ TREN</div>
                <div class="time-left">
                    <span id="minutes-left">--</span>
                    <small>dakika</small>
                </div>
                <div class="exact-time">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Kalkış: <strong id="exact-time">--:--</strong>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
